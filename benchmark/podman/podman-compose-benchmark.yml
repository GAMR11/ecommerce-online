version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    working_dir: /var/www/html
    volumes:
      - ../../:/var/www/html
    env_file:
      - ../../.env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
    networks:
      - laravel_network
    ports:
      - "8081:80"
    depends_on:
      - db

  db:
    image: docker.io/library/mysql:8.0
    restart: always
    env_file:
      - ../../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - laravel_network
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

networks:
  laravel_network:
    driver: bridge
