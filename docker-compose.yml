version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ecommerce-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # ⭐ CRÍTICO: Acceso a Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Acceso a Docker CLI
      - /usr/bin/docker:/usr/bin/docker:ro
      # Acceso a docker-compose (si lo tienes instalado localmente)
      - /usr/local/bin/docker-compose:/usr/local/bin/docker-compose:ro
    environment:
      - JAVA_OPTS=-Xmx1024m -Xms512m
    networks:
      - laravel_network
    user: root  # ⭐ IMPORTANTE: root para acceder a docker.sock
    # Alternativa (si quieres usar usuario jenkins):
    # user: "jenkins:docker"  # Requiere que exista el grupo docker

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecommerce-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - laravel_network
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: ecommerce-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel_network

  mysql:
    image: mysql:8
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: comgus_inventario
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  laravel_network:
    driver: bridge

volumes:
  jenkins_data:
    driver: local
  mysql_data:
    driver: local